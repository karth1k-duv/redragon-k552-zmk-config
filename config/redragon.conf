CONFIG_ZMK_KEYBOARD_NAME="Redragon K552"

# ZMK Studio Settings
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Hardware Safety Overrides
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_EXT_POWER=n
CONFIG_ZMK_BATTERY_REPORTING=n # Prevents ghosting/crashes on column 5 (Pin 0.31)

# Spoof the USB VID and PID to bypass corrupted Windows registry caches
CONFIG_USB_DEVICE_VID=0x1234
CONFIG_USB_DEVICE_PID=0x5678

# ===============================================
# GAMING & PERFORMANCE TWEAKS
# ===============================================
# Force 1000Hz polling rate for wired USB connections
CONFIG_USB_HID_POLL_INTERVAL_MS=1

# Aggressive debouncing for instant actuation
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# ===============================================
# BLUETOOTH OPTIMIZATION & POWER
# ===============================================
# Maximize Bluetooth transmit power (+8dBm) to prevent dropped inputs
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Force Bluetooth initialization on boot
CONFIG_BT=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_ZMK_BLE=y

# Set the initial output to Bluetooth (BLE) rather than USB
CONFIG_ZMK_USB_BOOT=n

# Enable deep sleep mode to save battery (Timeout: 15 minutes)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
